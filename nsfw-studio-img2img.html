<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSFW Studio • Img2Img + Text2Img</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .title { font-family: 'Space Grotesk', sans-serif; }
        .dropzone { transition: all 0.3s; }
        .dropzone.dragover { background-color: rgb(190 18 60 / 0.1); border-color: rgb(244 63 94); }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
    <div class="max-w-screen-2xl mx-auto">
        <header class="border-b border-zinc-800 bg-zinc-900 py-5 px-8 flex items-center justify-between sticky top-0 z-50">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-gradient-to-br from-rose-500 to-purple-600 rounded-3xl flex items-center justify-center text-2xl">🔥</div>
                <div>
                    <h1 class="title text-4xl font-bold tracking-tighter">NSFW Studio</h1>
                    <p class="text-rose-400 text-sm">Text2Img + Img2Img • Unzensiert</p>
                </div>
            </div>
            <div onclick="toggleNSFW()" id="nsfw-btn"
                 class="flex items-center gap-3 px-6 py-3 bg-zinc-800 rounded-3xl cursor-pointer border border-rose-500 hover:bg-zinc-700">
                <i class="fas fa-exclamation-triangle text-rose-500"></i>
                <span class="font-semibold text-rose-400">NSFW + Nackt aktiviert</span>
            </div>
        </header>

        <div class="flex">
            <!-- Sidebar -->
            <div class="w-96 bg-zinc-900 border-r border-zinc-800 p-8 h-screen overflow-auto">
                <div class="space-y-8">
                    <!-- Upload -->
                    <div>
                        <label class="block text-xs uppercase tracking-widest text-zinc-500 mb-3">Referenzbild hochladen (Img2Img)</label>
                        <div id="dropzone" 
                             class="dropzone border-2 border-dashed border-zinc-700 hover:border-rose-400 rounded-3xl h-52 flex flex-col items-center justify-center cursor-pointer text-center p-6">
                            <i class="fas fa-cloud-upload-alt text-4xl text-zinc-500 mb-3"></i>
                            <p class="text-zinc-400">Bild hier ablegen oder klicken</p>
                            <input type="file" id="image-upload" accept="image/*" class="hidden">
                        </div>
                        <div id="uploaded-preview" class="hidden mt-4">
                            <img id="uploaded-img" class="w-full rounded-3xl border border-zinc-700">
                            <button onclick="removeUploaded()" 
                                    class="mt-3 text-xs text-rose-400 hover:text-rose-300 flex items-center gap-1">
                                <i class="fas fa-trash"></i> Bild entfernen
                            </button>
                        </div>
                    </div>

                    <!-- Prompt -->
                    <div>
                        <label class="block text-xs uppercase tracking-widest text-zinc-500 mb-2">Prompt</label>
                        <textarea id="prompt" rows="4" 
                            class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl p-6 focus:border-rose-500 focus:outline-none"
                            placeholder="Nackte Frau in sinnlicher Pose, bessere Beleuchtung, detaillierte Haut..."></textarea>
                    </div>

                    <div>
                        <label class="block text-xs uppercase tracking-widest text-zinc-500 mb-2">Stärke des Referenzbildes</label>
                        <input type="range" id="strength" min="0" max="100" value="65" 
                               class="w-full accent-rose-500">
                        <div class="flex justify-between text-xs text-zinc-400 mt-1">
                            <span>Mehr Kreativität</span>
                            <span id="strength-value">65%</span>
                            <span>Stark am Original</span>
                        </div>
                    </div>

                    <!-- Mode -->
                    <div class="flex gap-2">
                        <button onclick="setMode(0)" id="mode-text" 
                                class="flex-1 py-4 rounded-3xl font-medium bg-rose-600">Text2Img</button>
                        <button onclick="setMode(1)" id="mode-img" 
                                class="flex-1 py-4 rounded-3xl font-medium bg-zinc-800">Img2Img</button>
                    </div>

                    <button onclick="generate()" 
                            class="w-full py-7 text-xl font-semibold bg-gradient-to-r from-rose-600 to-purple-600 rounded-3xl flex items-center justify-center gap-3 hover:brightness-110 active:scale-95 transition-all">
                        <i class="fas fa-wand-magic-sparkles"></i>
                        <span>Bild generieren</span>
                    </button>
                </div>
            </div>

            <!-- Main Content -->
            <div class="flex-1 p-10">
                <div id="preview" class="bg-zinc-900 border border-zinc-800 rounded-3xl min-h-[560px] flex flex-col items-center justify-center relative overflow-hidden">
                    <div id="preview-content" class="text-center">
                        <i class="fas fa-image text-8xl text-zinc-700 mb-6"></i>
                        <p class="text-zinc-400">Lade ein Bild hoch oder gib einen Prompt ein</p>
                    </div>
                    
                    <div id="loading" class="hidden absolute inset-0 bg-black/80 flex items-center justify-center">
                        <div class="text-center">
                            <div class="w-16 h-16 border-4 border-zinc-600 border-t-rose-500 animate-spin rounded-full mx-auto mb-6"></div>
                            <p class="text-rose-400">Generiere NSFW-Bild...</p>
                        </div>
                    </div>
                </div>

                <h2 class="mt-12 mb-6 text-2xl font-semibold">Generierte Bilder</h2>
                <div id="gallery" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
            </div>
        </div>
    </div>

    <script>
        let uploadedImage = null;
        let currentMode = 0; // 0 = text2img, 1 = img2img
        let generatedImages = [];

        function init() {
            const dropzone = document.getElementById('dropzone');
            const fileInput = document.getElementById('image-upload');

            dropzone.addEventListener('click', () => fileInput.click());
            dropzone.addEventListener('dragover', e => {
                e.preventDefault();
                dropzone.classList.add('dragover');
            });
            dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
            dropzone.addEventListener('drop', e => {
                e.preventDefault();
                dropzone.classList.remove('dragover');
                handleFile(e.dataTransfer.files[0]);
            });

            fileInput.addEventListener('change', e => {
                if (e.target.files[0]) handleFile(e.target.files[0]);
            });

            // Strength slider
            const strengthSlider = document.getElementById('strength');
            strengthSlider.addEventListener('input', () => {
                document.getElementById('strength-value').textContent = strengthSlider.value + '%';
            });
        }

        function handleFile(file) {
            if (!file.type.startsWith('image/')) return alert("Bitte nur Bilddateien hochladen.");
            
            const reader = new FileReader();
            reader.onload = function(e) {
                uploadedImage = e.target.result;
                document.getElementById('uploaded-preview').classList.remove('hidden');
                document.getElementById('uploaded-img').src = uploadedImage;
            };
            reader.readAsDataURL(file);
        }

        function removeUploaded() {
            uploadedImage = null;
            document.getElementById('uploaded-preview').classList.add('hidden');
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('mode-text').classList.toggle('bg-rose-600', mode === 0);
            document.getElementById('mode-text').classList.toggle('bg-zinc-800', mode !== 0);
            document.getElementById('mode-img').classList.toggle('bg-rose-600', mode === 1);
            document.getElementById('mode-img').classList.toggle('bg-zinc-800', mode !== 1);
        }

        function toggleNSFW() {
            alert("NSFW-Modus ist bereits aktiviert (keine Zensur).");
        }

        function generate() {
            const prompt = document.getElementById('prompt').value.trim();
            if (!prompt && !uploadedImage) {
                alert("Gib bitte einen Prompt ein oder lade ein Referenzbild hoch.");
                return;
            }

            const loading = document.getElementById('loading');
            const previewContent = document.getElementById('preview-content');
            loading.classList.remove('hidden');
            previewContent.classList.add('hidden');

            setTimeout(() => {
                loading.classList.add('hidden');
                previewContent.classList.remove('hidden');

                const seed = Math.floor(Math.random() * 99999);
                const newUrl = uploadedImage 
                    ? `https://picsum.photos/id/${seed}/800/1100` 
                    : `https://picsum.photos/id/${seed + 100}/800/1100`;

                const imageObj = {
                    url: newUrl,
                    prompt: prompt || "Img2Img Variation",
                    hasReference: !!uploadedImage,
                    time: new Date().toLocaleTimeString()
                };

                generatedImages.unshift(imageObj);
                renderGallery();

                // Show in preview
                previewContent.innerHTML = `
                    <div class="flex flex-col md:flex-row gap-8 items-center p-8">
                        ${uploadedImage ? `
                        <div class="text-center">
                            <p class="text-xs text-zinc-500 mb-2">Referenzbild</p>
                            <img src="${uploadedImage}" class="max-h-80 rounded-3xl border border-zinc-700">
                        </div>` : ''}
                        
                        <div class="text-center">
                            <p class="text-xs text-rose-400 mb-2">Generiertes Bild</p>
                            <img src="${newUrl}" class="max-h-96 rounded-3xl shadow-2xl border border-rose-500/30">
                        </div>
                    </div>
                `;

            }, 1350);
        }

        function renderGallery() {
            const container = document.getElementById('gallery');
            container.innerHTML = '';

            generatedImages.forEach(img => {
                const div = document.createElement('div');
                div.className = "group relative bg-zinc-900 rounded-3xl overflow-hidden border border-zinc-700 hover:border-rose-500 cursor-pointer";
                div.innerHTML = `
                    <img src="${img.url}" class="w-full aspect-[4/5] object-cover">
                    <div class="absolute top-3 right-3 px-3 py-1 text-[10px] bg-black/70 rounded-full ${img.hasReference ? 'text-rose-400' : 'text-zinc-400'}">
                        ${img.hasReference ? 'Img2Img' : 'Text2Img'}
                    </div>
                    <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/90 p-4">
                        <p class="text-xs line-clamp-2">${img.prompt}</p>
                        <button onclick="event.stopImmediatePropagation(); download('${img.url}')" 
                                class="mt-4 w-full bg-white/10 hover:bg-white/20 py-2 rounded-2xl text-sm">Herunterladen</button>
                    </div>
                `;
                div.onclick = () => showModal(img);
                container.appendChild(div);
            });
        }

        function download(url) {
            const a = document.createElement('a');
            a.href = url;
            a.download = `nsfw-generated-${Date.now()}.jpg`;
            a.click();
        }

        function showModal(img) {
            const modal = document.createElement('div');
            modal.className = "fixed inset-0 bg-black/95 z-50 flex items-center justify-center p-6";
            modal.innerHTML = `
                <div class="max-w-4xl w-full bg-zinc-900 rounded-3xl overflow-hidden">
                    <img src="${img.url}" class="w-full max-h-[75vh] object-contain">
                    <div class="p-6">
                        <p class="text-zinc-300">${img.prompt}</p>
                        <button onclick="this.closest('.fixed').remove()" 
                                class="mt-6 px-10 py-4 bg-zinc-800 hover:bg-zinc-700 rounded-3xl w-full">Schließen</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }

        window.onload = init;
    </script>
</body>
</html>
