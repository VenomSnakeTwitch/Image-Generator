<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSFW Studio • Perchance AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .title { font-family: 'Space Grotesk', sans-serif; }
        iframe { border-radius: 16px; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
    <div class="max-w-screen-2xl mx-auto flex h-screen">
        <!-- Sidebar -->
        <div class="w-96 bg-zinc-900 border-r border-zinc-800 p-6 overflow-auto">
            <div class="flex items-center gap-3 mb-8">
                <div class="w-10 h-10 bg-gradient-to-br from-rose-500 to-purple-600 rounded-2xl flex items-center justify-center text-2xl">🔥</div>
                <h1 class="title text-3xl font-bold">NSFW Studio</h1>
            </div>

            <div class="mb-6">
                <label class="block text-xs uppercase tracking-widest text-zinc-400 mb-2">Dein Prompt</label>
                <textarea id="prompt" rows="4" class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl p-5 focus:border-rose-500" 
                    placeholder="beautiful nude young woman, detailed skin, sensual pose..."></textarea>
            </div>

            <button onclick="copyPrompt()" 
                    class="w-full py-4 bg-zinc-800 hover:bg-zinc-700 rounded-3xl mb-8">
                Prompt kopieren &amp; in Generator einfügen
            </button>

            <h3 class="text-xs uppercase text-zinc-500 mb-3">NSFW Prompt-Vorschläge</h3>
            <div id="suggestions" class="space-y-2"></div>
        </div>

        <!-- Generator -->
        <div class="flex-1 flex flex-col">
            <div class="bg-zinc-900 border-b border-zinc-800 px-6 py-4 flex items-center justify-between">
                <h2 class="font-semibold">Perchance AI Image Generator</h2>
                <a href="https://perchance.org/ai-photo-generator" target="_blank" class="text-rose-400 text-sm flex items-center gap-2">
                    <i class="fas fa-external-link-alt"></i> Direkt öffnen
                </a>
            </div>
            <iframe src="https://perchance.org/ai-photo-generator" 
                    class="flex-1 w-full border-0" allowfullscreen></iframe>
        </div>

        <!-- Galerie -->
        <div class="w-96 bg-zinc-900 border-l border-zinc-800 flex flex-col">
            <div class="p-6 border-b border-zinc-800">
                <h2 class="font-semibold">Meine Galerie</h2>
            </div>
            <div id="gallery" class="flex-1 p-6 overflow-auto grid grid-cols-2 gap-4"></div>
            
            <div class="p-6 border-t border-zinc-800">
                <input id="image-url" type="text" placeholder="Bild-URL hier einfügen" 
                       class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl p-4 text-sm mb-3">
                <button onclick="addToGallery()" 
                        class="w-full py-4 bg-rose-600 hover:bg-rose-500 rounded-3xl font-medium">
                    Zur Galerie hinzufügen
                </button>
            </div>
        </div>
    </div>

    <script>
        const suggestions = [
            "beautiful nude young woman, long hair, sensual pose, detailed skin texture, soft cinematic lighting, photorealistic",
            "nude asian girl lying on silk sheets, seductive expression, perfect body, warm lighting",
            "elegant nude woman standing in moonlight, artistic nude, highly detailed, realistic skin",
            "curvy redhead nude, bedroom setting, soft volumetric lighting, masterpiece"
        ];

        function initSuggestions() {
            const container = document.getElementById('suggestions');
            suggestions.forEach(text => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-3.5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm transition-all";
                btn.textContent = text.length > 70 ? text.substring(0,67)+'...' : text;
                btn.onclick = () => document.getElementById('prompt').value = text;
                container.appendChild(btn);
            });
        }

        function copyPrompt() {
            const prompt = document.getElementById('prompt').value.trim();
            if (prompt) {
                navigator.clipboard.writeText(prompt);
                alert("✅ Prompt kopiert! Füge ihn im Generator ein.");
            }
        }

        function addToGallery() {
            const urlInput = document.getElementById('image-url');
            const url = urlInput.value.trim();
            if (!url) return alert("Bitte eine gültige Bild-URL einfügen");

            const gallery = document.getElementById('gallery');
            const item = document.createElement('div');
            item.className = "relative group rounded-3xl overflow-hidden border border-zinc-700 hover:border-rose-500";
            item.innerHTML = `
                <img src="\( {url}" class="w-full aspect-square object-cover cursor-pointer" onclick="window.open(' \){url}', '_blank')">
                <button onclick="this.parentElement.remove()" 
                        class="absolute top-2 right-2 bg-black/70 hover:bg-red-600 px-2 py-1 text-xs rounded-xl">✕</button>
            `;
            gallery.prepend(item);
            urlInput.value = '';
        }

        window.onload = initSuggestions;
    </script>
</body>
</html>
